name: Release Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v1.0.0). Leave empty to use commit SHA."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows amd64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($Env:GITHUB_REF -like "refs/tags/*") {
            $v = $Env:GITHUB_REF -replace "^refs/tags/",""
          } elseif (-not [string]::IsNullOrWhiteSpace("${{ github.event.inputs.version }}")) {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = "dev-$($Env:GITHUB_SHA.Substring(0,7))"
          }
          echo "version=$v" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          echo "Resolved version: $v"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          "$(go env GOPATH)\bin" | Out-File -FilePath $Env:GITHUB_PATH -Append -Encoding utf8

      - name: Wails doctor
        shell: pwsh
        run: wails doctor

      - name: Install frontend deps
        shell: pwsh
        working-directory: frontend
        run: npm ci

      - name: Build Windows amd64 binary
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          wails build `
            -platform windows/amd64 `
            -clean `
            -trimpath `
            -ldflags "-s -w -X main.Version=$version"

      - name: Package artifacts
        id: pkg
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $binDir  = "build/bin"
          $srcExe  = Join-Path $binDir "tinyEditor.exe"
          if (-not (Test-Path $srcExe)) {
            throw "Built binary not found: $srcExe"
          }

          $stageDir = "dist-release"
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null

          $exeName = "TextMind-$version-windows-amd64.exe"
          $zipName = "TextMind-$version-windows-amd64.zip"
          $exePath = Join-Path $stageDir $exeName
          $zipPath = Join-Path $stageDir $zipName

          Copy-Item $srcExe $exePath -Force
          Compress-Archive -Path $exePath -DestinationPath $zipPath -Force

          $sha = (Get-FileHash $exePath -Algorithm SHA256).Hash
          "SHA256 ($exeName) = $sha" | Out-File -FilePath (Join-Path $stageDir "SHA256SUMS.txt") -Encoding utf8

          echo "exe_path=$exePath" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          echo "zip_path=$zipPath" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          echo "sums_path=$(Join-Path $stageDir 'SHA256SUMS.txt')" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8

          Get-ChildItem $stageDir

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: textmind-windows-amd64-${{ steps.ver.outputs.version }}
          path: dist-release/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TextMind ${{ steps.ver.outputs.version }}
          tag_name: ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.exe_path }}
            ${{ steps.pkg.outputs.zip_path }}
            ${{ steps.pkg.outputs.sums_path }}
